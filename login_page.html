
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
 
 .div_main {                   /*Here You can use justify-content: space-between here, which will automatically create space between div_1 and div_2. */
    display: flex;
    flex-direction: row;        /*Advantage of  justify-content: space between is that you dont have to make it reponsive it will adjust its size accordingly*/
    flex-wrap: wrap;
    height: 100vh;
 }

 .div_m1 {
    height: 100vh;
    width: 800px;
    margin-bottom: 0;
    background-image: url(pic8.jpg);
    background-size:auto 100vh ;        /* Instead of using size to fill image you can simply use background-size: cover;*/
    background-position: center;
    background-repeat: no-repeat;
    display: block;                     /*Extra line by default it block*/
 }

 .div_m11 {
    font-family: Arial, Helvetica, sans-serif;   /*always try to set font in body or universal tag*/
    font-size: 35px;
    margin-left: 20px;
    color: whitesmoke;
 }
 
 .div_m12 {
    margin-top: 640px;
    margin-left: 20px;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 30px;
    color: whitesmoke;
 }

 .div_m2 {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 30px;
    flex-wrap: wrap;
    width: calc(100% - 800px);          /* Avoid using fix units e.g. px instead use % ( percentage )*/
    /* display: flex;
    width: 800px;
    flex: 1; */
    height: 100vh; 

 }

#login {
    margin-left: 460px;
    margin-top: 220px;
}

#text {
    white-space: pre-wrap;
    font-size: small;
    margin-left: 340px;
}

.email_field {
    width: 400px;
    height: 45px;
    margin-left: 320px;
    border: 2px solid;
    border-radius: 22px;
}

.pass_field {
    width: 400px;
    height: 45px;
    margin-left: 320px;
    border: 2px solid;
    border-radius: 22px;
}

.submit_btn {
    height: 40px;
    width: 160px;
    text-align: center;
    align-items: center;
    border-radius: 25px;
    margin-left: 450px;
    font-family: Arial, Helvetica, sans-serif;          /*set font only 1 time in body tag*/
    font-size: medium;
    font-weight: bolder;
}

.text2 {
    text-align: center;
    align-items: center;
    font-size: small;
    margin-left: -20px;
}








/* Media Queries Start */


@media (max-width: 1024px) {
    /* Adjust left column size */
    .div_m1 {
        width: 100%;
        height: 50vh;
        background-size: cover;
    }

    .div_m12 {
        margin-top: 20px;
        font-size: 25px;
    }

    .div_m11 {
        font-size: 40px;
    }

    /* Adjust login section */
    .div_m2 {
        width: 100%;
        font-size: 24px;
    }

    #login {
        margin-left: 0;
        text-align: center;
        margin-top: 30px;
    }

    .email_field,
    .pass_field {
        width: 80%;
        margin-left: 10%;
    }

    .submit_btn {
        margin-left: auto;
        margin-right: auto;
        display: block;
    }

    #text,
    .text2 {
        margin-left: 10%;
        margin-right: 10%;
        text-align: center;
    }
}

@media (max-width: 600px) {
    .div_m11,
    .div_m12 {
        font-size: 20px;
    }

    .email_field,
    .pass_field {
        height: 40px;
    }

    .submit_btn {
        width: 140px;
        height: 36px;
        font-size: small;
    }

    #text,
    .text2 {
        font-size: smaller;
    }
}
#ss
{
    white-space: pre-wrap;
    align-items: center;
    margin-left: 300px;
    margin-top: 150px;
}
#tlg
{
    white-space: pre-wrap;
    margin-top: -200px;

}

 
/* Media Queries End   */




 /*Overall Review : Use flex properties more like justify-content: center | justify-content: space-between | justify-content: space-around you dont have to make them responsive they are by default responsive they adjust there size accoding to there surrounding*/
/* Instead of fix units like px (pixels) use % for sizing advantage by default responsive  */
/* Only set font once in body tag */

    </style>
    <title>Login Page</title>
</head>

<body>
    <div class="div_main">
        <div class="div_m1">
            <div class="div_m11">
                <h4 id="ss">Skill<br>   Swap</h4>
            </div>
            <div class="div_m12">
                <h4 id="tlg">Teach  -  Learn  -  Grow</h4>
            </div>
        </div>
        <div class="div_m2">
            <h2 id="login"> Login</h2>
            <div>
                <form name="login_form" onsubmit="alert('form submitted successsfully')">
                    <input type="email" class="email_field" name="email" placeholder="Email">
                    <br><br>
                    <input type="password" class="pass_field" name="pass" placeholder="password"/>
                    <br>
                    <p id="text">dont have account?  <a href="signup_page.html">Signup</a>                    <a href="#">Forgot password?</a></p>
                    <br>
                    <input type="submit"  class="submit_btn" value="Login" />
                    <br><br>
                    <p class="text2">if you are having any trouble please contact <br> <a href="#">support@Skillswap.com</a></p>
                </form>
            </div>
        </div>        
    </div>
</body>
</html>
